<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Daily Routine</title>
</head>
<body>

  <h1>Minha Semana</h1>

  <div class="dia">
    <h2>Segunda-feira</h2>
    <ul>
      <li>
        <input type="checkbox" onchange="riscar(this)"> Revisar metas da semana
      </li>
      <li>
        <input type="checkbox" onchange="riscar(this)"> Exercício físico
      </li>
    </ul>
  </div>

  <div class="dia">
    <h2>Terça-feira</h2>
    <ul>
      <li>
        <input type="checkbox" onchange="riscar(this)"> Reunião principal
      </li>
      <li>
        <input type="checkbox" onchange="riscar(this)"> Culto da terça
      </li>
    </ul>
  </div>

  <script>

    function riscar(checkbox) {
      let tarefa = checkbox.parentElement;
      if (checkbox.checked) {
        tarefa.classList.add("concluida");
      } else {
        tarefa.classList.remove("concluida");
      }
    }

  </script>

</body>
</html>
